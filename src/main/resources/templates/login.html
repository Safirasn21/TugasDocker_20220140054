<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Tugas Docker 20220140054</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow login-box">
        <div class="card-body p-4">
            <h3 class="fw-bold text-center mb-1">Login Page</h3>
            <p class="text-center text-muted mb-4">Tugas Docker 20220140054</p>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form method="post" th:action="@{/login}" th:object="${user}">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" th:field="*{username}" placeholder="Masukkan username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" th:field="*{password}" placeholder="Masukkan password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <div class="alert alert-info mt-4 mb-0 small">
                Username: <strong>admin</strong><br>
                Password: <strong th:text="${nim}">20220140054</strong>
            </div>
        </div>
    </div>
</div>
</body>
</html>
