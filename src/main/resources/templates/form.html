<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form | Tugas Docker 20220140054</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/home}">TugasDocker_20220140054</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" th:href="@{/home}">Home</a>
            <a class="btn btn-danger btn-sm" th:href="@{/logout}">Logout</a>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="fw-bold mb-1">Form Input Mahasiswa</h3>
            <p class="text-muted">Isi data mahasiswa, minimal nama dan NIM.</p>

            <form method="post" th:action="@{/form}">
                <div class="mb-3">
                    <label class="form-label">Nama</label>
                    <input type="text" name="nama" class="form-control" placeholder="Masukkan nama" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">NIM</label>
                    <input type="text" name="nim" class="form-control" placeholder="Masukkan NIM" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Jenis Kelamin</label>
                    <select name="jenisKelamin" class="form-select" required>
                        <option value="">Pilih jenis kelamin</option>
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Alamat</label>
                    <textarea name="alamat" class="form-control" rows="3" placeholder="Masukkan alamat" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Simpan</button>
                <a th:href="@{/home}" class="btn btn-secondary">Kembali ke Home</a>
            </form>
        </div>
    </div>
</main>
</body>
</html>
